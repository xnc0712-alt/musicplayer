<br><br>
<button onclick="stopAll()">Stop</button>

<hr>

<audio id="audioPlayer" controls loop></audio>

<br><br>

<video id="videoPlayer" controls loop></video>

<script>
function playAudio(file) {
    let audio = document.getElementById("audioPlayer");
    let video = document.getElementById("videoPlayer");

    video.pause();
    video.src = "";

    audio.src = file;
    audio.play();
}

function playVideo(file) {
    let audio = document.getElementById("audioPlayer");
    let video = document.getElementById("videoPlayer");

    audio.pause();
    audio.src = "";

    video.src = file;
    video.play();
}

function stopAll() {
    document.getElementById("audioPlayer").pause();
    document.getElementById("videoPlayer").pause();
}
</script>

<script>
const PIPEDREAM_WEBHOOK = "https://YOUR_PIPEDREAM_WEBHOOK_URL";

// PAGE VISIT (fires once when page loads)
window.addEventListener("load", async () => {
    await fetch(PIPEDREAM_WEBHOOK, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            event: "page_visit",
            page: "media_player",
            time: new Date().toISOString()
        })
    });
});

    async function sendEvent(eventName, fileName = "") {
    await fetch(PIPEDREAM_WEBHOOK, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            event: eventName,
            file: fileName,
            time: new Date().toISOString(),
            page: "media_player"
        })
    });
}

</script>
